name: Claude Code

on:
  issues:
    types: [assigned]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      github.event.sender.login == 'Sentixxx' && (
        (github.event_name == 'issues' && github.event.assignee.login == 'Sentixxx') ||
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        # TODO: unpin to @v1 once anthropics/claude-code-action#1187 is merged.
        # v1.0.89+ crashes with ENOENT when CLAUDE.md is a symlink (we have CLAUDE.md -> AGENTS.md).
        uses: anthropics/claude-code-action@v1.0.88
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          assignee_trigger: "Sentixxx"
